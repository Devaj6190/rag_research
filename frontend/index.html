<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Research Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Ensure dark background even before Tailwind loads */
    body { background-color: #111827; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center py-12 px-4">

  <div class="w-full max-w-3xl flex flex-col gap-6">
    <h1 class="text-2xl font-bold text-indigo-400 tracking-tight">RAG Research Assistant</h1>

    <!-- Input area -->
    <div class="flex flex-col gap-3">
      <textarea
        id="question"
        rows="4"
        placeholder="Ask a question about your papers… (Enter to send, Shift+Enter for newline)"
        class="w-full rounded-lg bg-gray-800 border border-gray-700 text-gray-100 placeholder-gray-500 p-3 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
      ></textarea>
      <button
        id="sendBtn"
        class="self-end flex items-center gap-2 px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed font-semibold transition"
      >
        <svg id="spinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
        <span id="btnText">Send</span>
      </button>
    </div>

    <!-- Error banner -->
    <div id="errorBanner" class="hidden rounded-lg bg-red-900 border border-red-700 text-red-200 px-4 py-3 text-sm"></div>

    <!-- Results -->
    <div id="results" class="hidden flex flex-col gap-5">
      <!-- Answer -->
      <div class="rounded-lg bg-gray-800 border border-gray-700 p-5">
        <h2 class="text-sm font-semibold text-indigo-400 uppercase tracking-widest mb-3">Answer</h2>
        <p id="answerText" class="text-gray-100 whitespace-pre-wrap leading-relaxed"></p>
      </div>

      <!-- Sources -->
      <div>
        <h2 class="text-sm font-semibold text-indigo-400 uppercase tracking-widest mb-3">Sources</h2>
        <div id="sourcesContainer" class="flex flex-col gap-3"></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question');
    const sendBtn = document.getElementById('sendBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorBanner = document.getElementById('errorBanner');
    const resultsEl = document.getElementById('results');
    const answerText = document.getElementById('answerText');
    const sourcesContainer = document.getElementById('sourcesContainer');

    questionEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitQuery();
      }
    });

    sendBtn.addEventListener('click', submitQuery);

    async function submitQuery() {
      const question = questionEl.value.trim();
      if (!question) return;

      // Reset UI
      errorBanner.classList.add('hidden');
      resultsEl.classList.add('hidden');
      sendBtn.disabled = true;
      spinner.classList.remove('hidden');
      btnText.textContent = 'Thinking…';

      try {
        const res = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }

        const data = await res.json();

        answerText.textContent = data.answer;

        sourcesContainer.innerHTML = '';
        data.sources.forEach((src, i) => {
          const details = document.createElement('details');
          details.className = 'rounded-lg bg-gray-800 border border-gray-700 overflow-hidden';

          const summary = document.createElement('summary');
          summary.className = 'cursor-pointer px-4 py-3 text-sm font-medium text-indigo-300 hover:bg-gray-750 select-none list-none flex items-center justify-between';
          summary.innerHTML = `
            <span>Chunk ${i + 1} — <span class="text-gray-400 font-normal">${escapeHtml(src.source)}</span></span>
            <svg class="h-4 w-4 text-gray-500 transition-transform details-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>`;

          const body = document.createElement('div');
          body.className = 'px-4 pb-4 pt-1 text-sm text-gray-300 whitespace-pre-wrap leading-relaxed border-t border-gray-700';
          body.textContent = src.text;

          details.appendChild(summary);
          details.appendChild(body);
          sourcesContainer.appendChild(details);
        });

        resultsEl.classList.remove('hidden');
      } catch (err) {
        errorBanner.textContent = err.message;
        errorBanner.classList.remove('hidden');
      } finally {
        sendBtn.disabled = false;
        spinner.classList.add('hidden');
        btnText.textContent = 'Send';
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
