<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedResearch AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body {
      background: radial-gradient(ellipse at 20% 50%, #0d2d3a 0%, #080f1a 50%, #0a1628 100%);
      min-height: 100vh;
    }
    .orb1 {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(20,184,166,0.12) 0%, transparent 70%);
      top: -150px; left: -150px; pointer-events: none; z-index: 0;
    }
    .orb2 {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
      bottom: -100px; right: -100px; pointer-events: none; z-index: 0;
    }
    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .glass-sidebar {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .input-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f1f5f9;
      transition: all 0.2s;
      resize: none;
    }
    .input-field::placeholder { color: rgba(255,255,255,0.2); }
    .input-field:focus {
      outline: none;
      border-color: rgba(20,184,166,0.4);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 3px rgba(20,184,166,0.08);
    }
    .btn-primary {
      background: linear-gradient(135deg, #0d9488, #0891b2);
      transition: all 0.2s;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,148,136,0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      transition: all 0.2s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.15); }
    .answer-glass {
      background: linear-gradient(135deg, rgba(13,148,136,0.08) 0%, rgba(8,145,178,0.06) 100%);
      border: 1px solid rgba(20,184,166,0.2);
      backdrop-filter: blur(12px);
    }
    .source-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      transition: border-color 0.2s;
    }
    .source-card:hover { border-color: rgba(255,255,255,0.12); }
    .chip {
      background: rgba(20,184,166,0.1);
      border: 1px solid rgba(20,184,166,0.2);
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    details[open] .chevron { transform: rotate(180deg); }
    .chevron { transition: transform 0.2s ease; }
    .nav-item { transition: all 0.15s; color: rgba(255,255,255,0.45); }
    .nav-item:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.06); }
    .nav-item.active { color: #5eead4; background: rgba(20,184,166,0.12); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .error-glass { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); }
  </style>
</head>
<body class="flex">
  <div class="orb1"></div>
  <div class="orb2"></div>

  <!-- Sidebar -->
  <aside class="glass-sidebar w-60 min-h-screen flex-col hidden lg:flex relative z-10 flex-shrink-0">
    <div class="px-5 py-5 border-b border-white/5">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0"
          style="background: linear-gradient(135deg, #0d9488, #0891b2); box-shadow: 0 4px 12px rgba(13,148,136,0.3);">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <div>
          <div class="text-white font-semibold text-sm">MedResearch AI</div>
          <div class="text-slate-500 text-xs">Clinical Assistant</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 px-3 py-4 flex flex-col gap-0.5">
      <p class="text-xs font-semibold text-slate-600 uppercase tracking-widest px-3 mb-2">Research</p>
      <a href="/" class="nav-item active flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-medium">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        Query Papers
      </a>
    </nav>

    <div class="px-3 py-4 border-t border-white/5">
      <button onclick="logout()"
        class="nav-item w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 min-h-screen overflow-y-auto relative z-10 flex flex-col">

    <!-- Mobile header -->
    <header class="lg:hidden flex items-center justify-between px-4 py-3 border-b border-white/5" style="background: rgba(255,255,255,0.02); backdrop-filter: blur(12px);">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, #0d9488, #0891b2);">
          <svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <span class="font-semibold text-white text-sm">MedResearch AI</span>
      </div>
      <button onclick="logout()" class="text-slate-500 hover:text-slate-300 text-xs transition">Sign out</button>
    </header>

    <div class="flex-1 px-4 lg:px-10 py-8 max-w-3xl w-full mx-auto flex flex-col gap-6">

      <!-- Header -->
      <div>
        <h1 class="text-xl font-bold text-white">Research Query</h1>
        <p class="text-slate-500 text-sm mt-0.5">Search across your indexed clinical papers</p>
      </div>

      <!-- Input card -->
      <div class="glass rounded-2xl p-5 flex flex-col gap-3">
        <div id="fileChips" class="hidden flex-wrap gap-2"></div>

        <textarea
          id="question"
          rows="4"
          placeholder="e.g. What is the effect of cranioplasty timing on hydrocephalus outcomes?"
          class="input-field w-full rounded-xl px-4 py-3.5 text-sm"
        ></textarea>

        <input id="fileInput" type="file" multiple accept=".pdf,.doc,.docx" class="hidden" />

        <div class="flex items-center justify-between">
          <button id="attachBtn" class="btn-ghost flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-medium">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.586-6.586a4 4 0 00-5.656-5.656L5.757 10.757a6 6 0 108.485 8.485L20 13"/>
            </svg>
            Attach
          </button>

          <button id="sendBtn" class="btn-primary flex items-center gap-2 px-5 py-2.5 rounded-xl text-white font-semibold text-sm">
            <svg id="spinner" class="hidden animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
            <span id="btnText">Search</span>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div id="errorBanner" class="hidden error-glass rounded-xl px-4 py-3 text-sm text-red-300"></div>

      <!-- Results -->
      <div id="results" class="hidden flex-col gap-4">

        <!-- Answer -->
        <div class="answer-glass rounded-2xl p-6">
          <div class="flex items-center gap-2 mb-4">
            <div class="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0" style="background: linear-gradient(135deg, #0d9488, #0891b2);">
              <svg class="w-2.5 h-2.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
            <span class="text-xs font-semibold text-teal-400 uppercase tracking-widest">Answer</span>
          </div>
          <p id="answerText" class="text-slate-200 whitespace-pre-wrap leading-relaxed text-sm"></p>
        </div>

        <!-- Sources -->
        <div>
          <p class="text-xs font-semibold text-slate-600 uppercase tracking-widest mb-3 px-1">Source Chunks</p>
          <div id="sourcesContainer" class="flex flex-col gap-2"></div>
        </div>

      </div>
    </div>
  </main>

  <script>
    const questionEl = document.getElementById('question');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const fileChips = document.getElementById('fileChips');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorBanner = document.getElementById('errorBanner');
    const resultsEl = document.getElementById('results');
    const answerText = document.getElementById('answerText');
    const sourcesContainer = document.getElementById('sourcesContainer');

    let attachedFiles = [];

    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      for (const file of fileInput.files) {
        if (!attachedFiles.find(f => f.name === file.name)) attachedFiles.push(file);
      }
      fileInput.value = '';
      renderChips();
    });

    function renderChips() {
      fileChips.innerHTML = '';
      if (attachedFiles.length === 0) { fileChips.classList.add('hidden'); fileChips.classList.remove('flex'); return; }
      fileChips.classList.remove('hidden');
      fileChips.classList.add('flex');
      attachedFiles.forEach((file, i) => {
        const chip = document.createElement('div');
        chip.className = 'chip flex items-center gap-1.5 rounded-full px-3 py-1 text-xs text-teal-300 font-medium';
        chip.innerHTML = `
          <svg class="w-3 h-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.586-6.586a4 4 0 00-5.656-5.656L5.757 10.757a6 6 0 108.485 8.485L20 13"/>
          </svg>
          <span class="max-w-[160px] truncate">${escapeHtml(file.name)}</span>
          <button data-i="${i}" class="ml-0.5 text-teal-500 hover:text-teal-200 transition leading-none">×</button>`;
        chip.querySelector('button').addEventListener('click', () => { attachedFiles.splice(i, 1); renderChips(); });
        fileChips.appendChild(chip);
      });
    }

    questionEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitQuery(); }
    });
    sendBtn.addEventListener('click', submitQuery);

    async function submitQuery() {
      const question = questionEl.value.trim();
      if (!question) return;
      errorBanner.classList.add('hidden');
      resultsEl.classList.remove('flex');
      resultsEl.classList.add('hidden');
      sendBtn.disabled = true;
      spinner.classList.remove('hidden');
      btnText.textContent = 'Searching…';

      try {
        const formData = new FormData();
        formData.append('question', question);
        for (const file of attachedFiles) formData.append('files', file);

        const res = await fetch('/api/query', { method: 'POST', body: formData });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }

        const data = await res.json();
        answerText.textContent = data.answer;

        sourcesContainer.innerHTML = '';
        data.sources.forEach((src, i) => {
          const details = document.createElement('details');
          details.className = 'source-card rounded-xl overflow-hidden';

          const summary = document.createElement('summary');
          summary.className = 'cursor-pointer px-4 py-3 select-none list-none flex items-center justify-between hover:bg-white/3 transition';
          summary.innerHTML = `
            <div class="flex items-center gap-3 min-w-0">
              <span class="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 text-xs font-bold text-teal-400"
                style="background: rgba(20,184,166,0.12); border: 1px solid rgba(20,184,166,0.2);">${i + 1}</span>
              <span class="text-xs text-slate-400 truncate">${escapeHtml(src.source)}</span>
            </div>
            <svg class="chevron w-3.5 h-3.5 text-slate-600 flex-shrink-0 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>`;

          const body = document.createElement('div');
          body.className = 'px-4 pb-4 pt-3 text-xs text-slate-400 whitespace-pre-wrap leading-relaxed border-t border-white/5';
          body.textContent = src.text;

          details.appendChild(summary);
          details.appendChild(body);
          sourcesContainer.appendChild(details);
        });

        resultsEl.classList.remove('hidden');
        resultsEl.classList.add('flex');
      } catch (err) {
        errorBanner.textContent = err.message;
        errorBanner.classList.remove('hidden');
      } finally {
        sendBtn.disabled = false;
        spinner.classList.add('hidden');
        btnText.textContent = 'Search';
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
