<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — RAG Research Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background-color: #111827; }</style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm flex flex-col gap-6">
    <div>
      <h1 class="text-2xl font-bold text-indigo-400">RAG Research Assistant</h1>
      <p class="text-gray-400 text-sm mt-1">Sign in to continue</p>
    </div>

    <form id="loginForm" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-sm text-gray-400" for="username">Username</label>
        <input
          id="username"
          type="text"
          autocomplete="username"
          class="rounded-lg bg-gray-800 border border-gray-700 text-gray-100 p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-sm text-gray-400" for="password">Password</label>
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          class="rounded-lg bg-gray-800 border border-gray-700 text-gray-100 p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
        />
      </div>

      <div id="errorMsg" class="hidden rounded-lg bg-red-900 border border-red-700 text-red-200 px-4 py-3 text-sm"></div>

      <button
        type="submit"
        id="submitBtn"
        class="flex items-center justify-center gap-2 px-5 py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed font-semibold transition"
      >
        <svg id="spinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
        <span id="btnText">Sign in</span>
      </button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');

      if (!username || !password) return;

      errorMsg.classList.add('hidden');
      submitBtn.disabled = true;
      spinner.classList.remove('hidden');
      btnText.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: 'Login failed' }));
          throw new Error(err.detail || 'Login failed');
        }

        window.location.href = '/';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        spinner.classList.add('hidden');
        btnText.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
